<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحف سور القرآن الكريم</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            overflow-y: hidden; /* يمنع التمرير لفوق وتحت */
            overflow-x: auto;   /* يسمح بالتمرير يمين ويسار */
            scroll-snap-type: x mandatory; /* يخلي الكرت يثبت في النص تلقائياً عند التمرير */
            -webkit-overflow-scrolling: touch;
        }
        
        /* حاوي الكروت يخليهم جنب بعض */
        .container {
            display: flex;
            padding: 20px;
            gap: 30px;
            height: 85vh;
            align-items: center;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            width: 85vw;
            max-width: 500px;
            flex-shrink: 0; /* يمنع الكروت من الإنضغاط */
            scroll-snap-align: center; /* يثبت الكرت في نص الشاشة */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        img {
            width: 100%;
            height: auto;
            max-height: 50vh; /* يضمن إن الصورة ما تطلع برّا الشاشة بالآيفون */
            object-fit: contain;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        audio {
            width: 100%;
            margin-top: 10px;
        }
        
        h2 {
            color: #2c3e50;
            font-size: 1.3rem;
            margin-top: 0;
            margin-bottom: 15px;
            font-weight: bold;
            text-align: center;
        }
        
        /* زر الفهرس فوق على اليسار */
        .index-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: #2c3e50;
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.95rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 1000;
        }
        
        .index-btn:hover {
            background-color: #34495e;
        }
    </style>
</head>
<body>

<!-- زر الفهرس فوق على اليسار -->
<a href="#menu" class="index-btn">الفهرس</a>

<div class="container">

    <!-- 1. سورة النبأ - الجزء الأول -->
    <div class="card" id="naba1">
        <h2>سورة النبأ - الجزء الأول</h2>
        <img src="IMG_2013.PNG" alt="سورة النبأ 1">
        <audio controls>
            <source src="naba1.m4a" type="audio/mp4">
        </audio>
    </div>

    <!-- 2. سورة النبأ - الجزء الثاني -->
    <div class="card" id="naba2">
        <h2>سورة النبأ - الجزء الثاني</h2>
        <img src="IMG_2048.PNG" alt="سورة النبأ 2">
        <audio controls>
            <source src="naba2.m4a" type="audio/mp4">
        </audio>
    </div>

    <!-- 3. سورة النازعات -->
    <div class="card" id="nazeat">
        <h2>سورة النازعات</h2>
        <img src="IMG_2049.PNG" alt="سورة النازعات">
        <audio controls>
            <source src="nazeat.m4a" type="audio/mp4">
        </audio>
    </div>

    <!-- 4. سورة عبس -->
    <div class="card" id="abas">
        <h2>سورة عبس</h2>
        <img src="IMG_2051.PNG" alt="سورة عبس">
        <audio controls>
            <source src="abas.m4a" type="audio/mp4">
        </audio>
    </div>

    <!-- 5. سورة التكوير -->
    <div class="card" id="takweer">
        <h2>سورة التكوير</h2>
        <img src="IMG_2062.PNG" alt="سورة التكوير">
        <audio controls>
            <source src="takweer.m4a" type="audio/mp4">
        </audio>
    </div>

</div>

</body>
</html>
